spring.application.name=Ventas
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/bd_ventas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=./logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

producto.service.url=http://localhost:8084/api/productos
usuario.service.url=http://localhost:8081/api/usuarios
estado.service.url=http://localhost:8083/api/estados
bodega.service.url=http://localhost:8085/api/productos_ubicaciones

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}